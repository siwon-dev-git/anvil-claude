name: Publish to npm

on:
  release:
    types: [published]

jobs:
  ci:
    name: CI Gates
    uses: ./.github/workflows/ci.yml

  publish:
    name: Publish
    needs: ci
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment:
      name: npm
      url: https://www.npmjs.com/package/anvil-claude
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          registry-url: 'https://registry.npmjs.org'

      - name: Verify version matches release tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          TAG_VERSION="${GITHUB_REF_NAME#v}"
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: package.json=$PKG_VERSION, tag=$TAG_VERSION"
            exit 1
          fi
          echo "Version verified: $PKG_VERSION"

      - name: Determine npm tag
        id: tag
        run: |
          PKG_VERSION=$(node -p "require('./package.json').version")
          if echo "$PKG_VERSION" | grep -qE '(alpha|beta|rc|next|canary)'; then
            NPM_TAG=$(echo "$PKG_VERSION" | grep -oE '(alpha|beta|rc|next|canary)')
          else
            NPM_TAG="latest"
          fi
          echo "npm_tag=$NPM_TAG" >> "$GITHUB_OUTPUT"
          echo "Publishing with tag: $NPM_TAG"

      - name: Publish to npm
        run: npm publish --provenance --access public --tag ${{ steps.tag.outputs.npm_tag }}
